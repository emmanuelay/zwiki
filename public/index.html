<!DOCTYPE html>
<html lang="en">
  <head>

              <ul>

                    <li><span>33</span></li>
                    <li><span>34</span></li>
                  </ul>
                </li>
                <li>
                  <input type="checkbox" id="22" />
                  <label for="22">22</label>
                  <ul>
                    <li><span>31</span></li>
                    <li><span>32</span></li>
                    <li><span>33</span></li>
                  </ul>
                </li>
                <li>

                  <ul>

            </li>

            <li><span>13</span></li>

        </div>
      </div>

      <div id="content">
        <div class="header">
          <div class="title">
          	<h1 id="content-title">Content title</h1>
			<div id="content-tags">
				<span>Tag 1</span>
				<span>Tag 2</span>
				<span>Tag 3</span>
			</div>
		  </div>
          <div class="actions">
            <button id="btn-save" class="hidden" disabled>Save</button>
            <button id="btn-edit">Edit</button>
          </div>
        </div>
        <div id="content-body">
          <div id="viewer" class="viewer"></div>
          <textarea id="editor" class="hidden"></textarea>
          <div id="outline"></div>
        </div>
      </div>
    </div>
  </body>
</html>
