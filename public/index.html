<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zwiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              mono: ['Roboto Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/marked.min.js"></script>
    <script src="/js/script.js"></script>
  </head>
  <body class="m-0 p-0 bg-white dark:bg-gray-950">
    <div id="container" class="flex flex-row h-screen">

      <!-- Sidebar -->
      <div id="toc" class="flex-none w-72 bg-gray-100 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 overflow-y-auto overflow-x-hidden">
        <div class="sticky top-0 z-10 bg-gray-200 dark:bg-gray-800 px-5 border-b border-black/5 dark:border-white/5 h-14 flex items-center justify-between">
          <h1 class="uppercase text-xs font-bold text-gray-600 dark:text-gray-300">ZWiki</h1>
          <button id="btn-darkmode" class="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-white cursor-pointer" title="Toggle dark mode">
            <svg id="icon-sun" class="hidden w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
          </button>
        </div>
        <div id="tree" class="tree"></div>
      </div>

      <!-- Content -->
      <div id="content" class="flex flex-col flex-1 overflow-hidden bg-white dark:bg-gray-950">
        <div class="sticky top-0 flex items-center justify-between px-5 bg-gray-50 dark:bg-gray-900 border-b border-black/5 dark:border-white/5 flex-none h-14">
          <div>
            <h1 id="content-title" class="uppercase text-xs font-bold text-gray-600 dark:text-gray-300">Content title</h1>
          </div>
          <div class="flex gap-2">
            <button id="btn-save" class="hidden uppercase text-xs px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded cursor-pointer disabled:bg-green-900 disabled:text-green-400 disabled:cursor-default disabled:hover:bg-green-900 disabled:hover:text-green-400" disabled>Save</button>
            <button id="btn-edit" class="uppercase text-xs px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white dark:text-gray-200 rounded cursor-pointer">Edit</button>
          </div>
        </div>
        <div id="content-body" class="flex flex-1 overflow-hidden">
          <div id="viewer" class="viewer"></div>
          <textarea id="editor" class="hidden flex-1 border-0 p-4 sm:p-8 lg:p-12 text-sm leading-relaxed font-mono text-black dark:text-gray-100 bg-white dark:bg-gray-950 caret-blue-600 resize-none outline-none"></textarea>
          <div id="outline" class="flex-none w-56 p-5 border-l border-gray-100 dark:border-gray-800 overflow-y-auto text-xs text-gray-500 dark:text-gray-400"></div>
        </div>
      </div>

    </div>
  </body>
</html>
