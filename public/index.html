<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zwiki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              mono: ['Roboto Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" id="hljs-light" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" media="none" id="hljs-dark" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="/js/marked.min.js"></script>
    <script src="/js/script.js"></script>
  </head>
  <body class="m-0 p-0 bg-white dark:bg-gray-950">
    <div id="container" class="flex flex-row h-screen">

      <!-- Sidebar overlay backdrop (mobile) -->
      <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/40 z-20 md:hidden" onclick="toggleSidebar()"></div>

      <!-- Sidebar -->
      <div id="toc" class="flex-none bg-gray-100 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 overflow-y-auto overflow-x-hidden fixed md:relative z-30 md:z-auto h-full" style="width: 18rem;">
        <div class="sticky top-0 z-10 bg-gray-200 dark:bg-gray-800 px-5 border-b border-black/5 dark:border-white/5 h-14 flex items-center justify-between">
          <h1 class="uppercase text-xs font-bold text-gray-600 dark:text-gray-300">ZWiki</h1>
          <button id="btn-darkmode" class="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-white cursor-pointer" title="Toggle dark mode">
            <svg id="icon-sun" class="hidden w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
          </button>
        </div>
        <div id="tree" class="tree"></div>
      </div>

      <!-- Resize handle -->
      <div id="resize-handle" class="flex-none w-1 cursor-col-resize bg-transparent hover:bg-blue-500/30 active:bg-blue-500/50 transition-colors"></div>

      <!-- Content -->
      <div id="content" class="flex flex-col flex-1 overflow-hidden bg-white dark:bg-gray-950">
        <div class="sticky top-0 flex items-center justify-between px-5 bg-gray-50 dark:bg-gray-900 border-b border-black/5 dark:border-white/5 flex-none h-14">
          <div class="flex items-center gap-3">
            <button id="btn-sidebar" class="md:hidden text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-white cursor-pointer" onclick="toggleSidebar()" title="Toggle sidebar">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <h1 id="content-title" class="uppercase text-xs font-bold text-gray-600 dark:text-gray-300">Content title</h1>
          </div>
          <div class="flex gap-2">
            <button id="btn-save" class="hidden uppercase text-xs px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded cursor-pointer disabled:opacity-50 disabled:cursor-default flex items-center gap-1.5" disabled>Save <kbd class="text-xs font-normal opacity-70 border border-white/30 rounded px-1 py-0.5">&#8984;S</kbd></button>
            <button id="btn-edit" class="uppercase text-xs px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white dark:text-gray-200 rounded cursor-pointer">Edit</button>
          </div>
        </div>
        <div id="content-body" class="flex flex-1 overflow-hidden">
          <div id="viewer" class="viewer"></div>
          <div id="editor-wrapper" class="hidden flex-1 flex flex-col relative">
            <div id="frontmatter-panel" class="hidden border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 overflow-y-auto" style="max-height: 30vh;">
              <div class="px-4 pt-3 pb-3">
                <span class="uppercase text-xs font-bold text-gray-400 dark:text-gray-500">Frontmatter</span>
              </div>
              <div id="frontmatter-fields" class="px-4 pb-2 flex flex-col gap-2"></div>
              <div class="px-4 pt-2 pb-4">
                <button id="btn-add-field" class="text-xs text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 cursor-pointer flex items-center gap-1">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                  Add field
                </button>
              </div>
            </div>
            <textarea id="editor" class="flex-1 border-0 p-4 sm:p-8 lg:p-12 text-sm leading-relaxed font-mono text-black dark:text-gray-100 bg-white dark:bg-gray-950 caret-blue-600 resize-none outline-none"></textarea>
            <button id="btn-frontmatter" class="absolute top-3 right-3 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 cursor-pointer" title="Edit frontmatter">
              <svg id="icon-fm-open" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
              <svg id="icon-fm-close" class="hidden w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div id="outline" class="flex-none w-56 p-5 border-l border-gray-100 dark:border-gray-800 overflow-y-auto text-xs text-gray-500 dark:text-gray-400"></div>
        </div>
      </div>

    </div>

    <!-- Search modal -->
    <div id="search-backdrop" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-start justify-center pt-[15vh]" onclick="closeSearch(event)">
      <div id="search-modal" class="bg-white dark:bg-gray-900 rounded-lg shadow-2xl border border-gray-200 dark:border-gray-700 w-full max-w-lg mx-4 overflow-hidden">
        <div class="flex items-center px-4 border-b border-gray-200 dark:border-gray-700">
          <svg class="w-4 h-4 text-gray-400 flex-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/></svg>
          <input id="search-input" type="text" placeholder="Search notes..." class="flex-1 px-3 py-3 text-sm bg-transparent border-0 outline-none text-black dark:text-gray-100 placeholder-gray-400" autocomplete="off" />
          <kbd class="text-[10px] text-gray-400 border border-gray-300 dark:border-gray-600 rounded px-1.5 py-0.5">ESC</kbd>
        </div>
        <div id="search-facets" class="hidden flex flex-wrap gap-1.5 px-4 py-2 border-b border-gray-200 dark:border-gray-700"></div>
        <div id="search-results" class="max-h-80 overflow-y-auto"></div>
      </div>
    </div>
  </body>
</html>
